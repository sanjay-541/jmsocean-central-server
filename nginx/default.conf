server {
    listen 80;
    server_name jmsocean.cloud www.jmsocean.cloud;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Keep ACME Challenge accessible for auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name jmsocean.cloud www.jmsocean.cloud;

    ssl_certificate /etc/letsencrypt/live/jmsocean.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jmsocean.cloud/privkey.pem;

    # SSL Parameters (Best Practices)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Increase body size
    client_max_body_size 200M;
}
