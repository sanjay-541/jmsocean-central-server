<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMS Ocean - Packing Settings</title>
    <link rel="stylesheet" href="/assets/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="main-content">
        <div class="header">
            <div class="page-title">Packing Settings</div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Assembly Lines & Scanner Configuration</h5>
                <button class="btn btn-primary btn-sm" onclick="openModal()">
                    <i class="bi bi-plus-lg"></i> Add New Line
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Line ID</th>
                                <th>Display Name</th>
                                <th>Scanner Config (Auto-Connect)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="linesTable">
                            <!-- JS Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="lineModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Assembly Line</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="lineForm">
                        <div class="mb-3">
                            <label class="form-label">Line ID (Unique)</label>
                            <input type="text" class="form-control" id="line_id" required>
                            <div class="form-text">e.g., 'Table-A', 'LINE-1'</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Display Name</label>
                            <input type="text" class="form-control" id="line_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Auto-Connect Scanner Config</label>
                            <input type="text" class="form-control mb-1" id="scanner_config"
                                placeholder="e.g. IP:192.168.1.50:9000">
                            <div class="form-text text-xs">
                                Formats: <br>
                                - <code>IP:192.168.1.50:9000</code> (Network)<br>
                                - <code>BRIDGE:COM1</code> (Local Serial)
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveLine()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/app.js?v=7"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let modal;
        let isEdit = false;

        document.addEventListener('DOMContentLoaded', () => {
            JPSMS.auth.requireAuth();
            JPSMS.renderShell('packing');
            modal = new bootstrap.Modal(document.getElementById('lineModal'));
            loadLines();
        });

        async function loadLines() {
            try {
                const res = await JPSMS.api.get('/assembly/lines');
                const tbody = document.getElementById('linesTable');
                tbody.innerHTML = res.data.map(l => `
                    <tr>
                        <td class="font-mono font-bold">${l.line_id}</td>
                        <td>${l.line_name}</td>
                        <td>
                            ${l.scanner_config ?
                        `<span class="badge bg-green-100 text-green-800 font-mono">${l.scanner_config}</span>` :
                        '<span class="text-gray-400 text-sm">None</span>'}
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editLine('${l.line_id}', '${l.line_name}', '${l.scanner_config || ''}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteLine('${l.line_id}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { JPSMS.toast(e.message, 'error'); }
        }

        function openModal() {
            isEdit = false;
            document.getElementById('modalTitle').textContent = 'Add Assembly Line';
            document.getElementById('line_id').value = '';
            document.getElementById('line_id').disabled = false;
            document.getElementById('line_name').value = '';
            document.getElementById('scanner_config').value = '';
            modal.show();
        }

        function editLine(id, name, config) {
            isEdit = true;
            document.getElementById('modalTitle').textContent = 'Edit Assembly Line';
            document.getElementById('line_id').value = id;
            document.getElementById('line_id').disabled = true; // PK cannot change
            document.getElementById('line_name').value = name;
            document.getElementById('scanner_config').value = config;
            modal.show();
        }

        async function saveLine() {
            const data = {
                line_id: document.getElementById('line_id').value,
                line_name: document.getElementById('line_name').value,
                scanner_config: document.getElementById('scanner_config').value
            };

            if (!data.line_id || !data.line_name) return JPSMS.toast('ID and Name required', 'error');

            try {
                await JPSMS.api.post('/assembly/lines', data);
                JPSMS.toast('Saved successfully', 'success');
                modal.hide();
                loadLines();
            } catch (e) { JPSMS.toast(e.message, 'error'); }
        }

        async function deleteLine(id) {
            if (!confirm(`Delete line ${id}? This will NOT delete plans, but might affect reporting.`)) return;
            try {
                await JPSMS.api.delete(`/assembly/lines/${id}`);
                loadLines();
            } catch (e) { JPSMS.toast(e.message, 'error'); }
        }
    </script>
</body>

</html>
