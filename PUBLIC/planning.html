                  <div style="font-family:monospace; font-weight:600">${p.order_no || p.orderNo}</div>
                   <div style="font-family:monospace; color:#0f172a; background:#f1f5f9; padding:2px 4px; border-radius:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${p.jcNo || ''}">${p.jcNo || '-'}</div>
                  <div style="overflow:hidden">
                      <div style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" title="${p.mould_name || p.mouldName}">${p.mould_name || p.mouldName}</div>
                      <div style="font-size:0.75rem; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${p.item_name || p.itemName}</div>
                  </div>
                  <div style="font-family:monospace">${p.mouldNo || '-'}</div>
                  <div style="font-size:0.8rem">${p.client_name || p.clientName || '-'}</div>
                  <div style="font-family:monospace">${qty.toLocaleString()}</div>
                  <div style="font-family:monospace; color:#16a34a; font-weight:bold">${prod.toLocaleString()}</div>
                  
                  <div class="mini">${start}</div>
                  <div class="mini">${end}</div>
                  <div class="mini">-</div>
                  <div class="mini">-</div>

                  <div><span class="${stClass}">DONE</span></div>
                  <div style="font-size:0.8rem; color:#475569; word-break:break-all">${p.completed_by || '-'}</div>
                  <div style="font-size:0.75rem; color:#64748b">${completedAt}</div>
               </div>
          `;
        });
        list.innerHTML = html;
      } catch (e) {
        list.innerHTML = `<div style="color:red; padding:20px">Error: ${e.message}</div>`;
      }
    };

    // --- MOULD CHANGE REPORT LOGIC ---
    window.loadMouldChangeReport = async function () {
      // FIX: Use correct ID matching HTML (mcrBody)
      const list = document.getElementById('mcrBody');
      if (!list) return;

      const dateInput = document.getElementById('mcDate');
      const shiftInput = document.getElementById('mcShift');

      // Use the IDs from the new HTML structure if different
      // HTML has id="mcrDate" and "mcrShift" (Step 261)
      // JS had "mcDate" and "mcShift"
      // CHECKING HTML AGAIN:
      // <input type="date" id="mcrDate" ...>
      // <select id="mcrShift" ...>

      const realDateInput = document.getElementById('mcrDate') || dateInput;
      const realShiftInput = document.getElementById('mcrShift') || shiftInput;

      // Default to Today if empty
      if (!realDateInput.value) {
        realDateInput.valueAsDate = new Date();
      }

      const selectedDateStr = realDateInput.value; // YYYY-MM-DD
      const selectedShift = realShiftInput.value; // 'Day', 'Night', 'Both'

      list.innerHTML = '<div style="padding:20px; text-align:center">Analyzing Master Plan...</div>';

      // 1. Get Data
      let plans = window.allMasterPlans || [];
      if (!plans.length) {
        // Try fetching if empty
        try {
          const api = (window.JPSMS && window.JPSMS.api) ? window.JPSMS.api : window.api;
          const res = await api.get('/planning/board');
          if (res && res.data && res.data.plans) {
            plans = res.data.plans;
            // Filter Unassigned
            plans = plans.filter(p => p.machine && p.machine !== '-' && p.machine.trim() !== '');
            window.allMasterPlans = plans;
          }
        } catch (e) { console.error(e); }
      }

      if (!plans.length) {
        list.innerHTML = '<div class="muted" style="padding:20px; text-align:center">No planning data available.</div>';
        return;
      }

      // 2. Sort by Machine > Start Date
      plans.sort((a, b) => {
        if (a.machine !== b.machine) return (a.machine || '').localeCompare(b.machine || '');
        return new Date(a.startDate) - new Date(b.startDate);
      });

      const changes = [];
      // Group by Machine
      const byMach = {};
      plans.forEach(p => {
        if (!byMach[p.machine]) byMach[p.machine] = [];
        byMach[p.machine].push(p);
      });

      Object.keys(byMach).forEach(mach => {
        const machPlans = byMach[mach];
        for (let i = 1; i < machPlans.length; i++) {
          const prev = machPlans[i - 1];
          const curr = machPlans[i];

          // Check if Mould Changed
          // Compare Mould No (Primary) or Name
          const prevMould = prev.mouldNo || prev.mould_code || prev.mouldName;
          const currMould = curr.mouldNo || curr.mould_code || curr.mouldName;

          // Ignore if same
          if (prevMould === currMould) continue;

          // CHANGE DETECTED
          // Time of change = End of Prev Plan
          // Use _calculatedEndRaw if available (highest precision), else endDate, else startDate + duration
          let changeTime = null;
          if (prev._calculatedEndRaw) {
            changeTime = new Date(prev._calculatedEndRaw);
          } else if (prev.endDate) {
            changeTime = new Date(prev.endDate);
          } else {
            changeTime = new Date(prev.startDate); // Fallback
          }

          // Filter by Selected Date
          const chDateStr = changeTime.toISOString().split('T')[0];

          // Shift Logic
          // Day: 08:00 - 20:00
          // Night: 20:00 - 08:00 (Next Day)
          let shift = 'Day';
          const hr = changeTime.getHours();
          if (hr >= 20 || hr < 8) shift = 'Night';

          // Correct Date Logic for Night Shift (If < 8 it belongs to previous Date's Night Shift)
          // But for Date Picker matching, usually users select "Production Date".
          // If it's 2 AM on the 21st, that's the Night Shift of the 20th.
          // So for filtering, if hr < 8, we should check dateStr of (Date - 1 day).

          let productionDateStr = chDateStr;
          if (hr < 8) {
            const d = new Date(changeTime);
            d.setDate(d.getDate() - 1);
            productionDateStr = d.toISOString().split('T')[0];
          }

          if (selectedDateStr !== productionDateStr) continue;
          if (selectedShift !== 'Both' && selectedShift !== shift) continue;

          changes.push({
            machine: mach,
            prevMould: prev.mouldName || 'Unknown',
            prevCode: prev.mouldNo || prev.mould_code || '-',
            nextMould: curr.mouldName || 'Unknown',
            nextCode: curr.mouldNo || curr.mould_code || '-',
            time: changeTime,
            shift: shift
          });
        }
      });

      // Render
      if (!changes.length) {
        list.innerHTML = `<div class="muted" style="padding:40px; text-align:center; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px">No mould changes found on ${selectedDateStr} (${selectedShift}).</div>`;
        return;
      }

      // Sort changes by Time
      changes.sort((a, b) => a.time - b.time);

      let html = `
        <div style="margin-bottom:10px; font-weight:700; color:#64748b; font-size:0.9rem">Found ${changes.length} Changes</div>
        <!-- Headers are already in HTML for this view, but we can re-render list only OR render full table if we prefer list items -->
        <!-- Based on HTML structure in Step 261, #mcrBody is just the container for rows -->
        <div style="display:flex; flex-direction:column; gap:8px">
      `;

      changes.forEach(c => {
        const timeStr = c.time.toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit' });
        html += `
             <div class="row" style="display:grid; grid-template-columns: 100px 180px 1fr 1fr 150px 100px; gap:10px; padding:12px 10px; border-bottom:1px solid #f1f5f9; align-items:center; font-size:0.9rem; background:#fff; border:1px solid #e2e8f0; border-radius:6px">
                 <div style="font-weight:700; color:#0f172a">${selectedDateStr}</div> 
                 <!-- Using machine column width from header -->
                 <div style="font-weight:700; color:#334155">${c.machine}</div>
                 <div style="color:#64748b">
                    <div style="font-weight:600; color:#dc2626">${c.prevMould}</div>
                    <div style="font-size:0.75rem; font-family:monospace">${c.prevCode}</div>
                 </div>
                 <div style="color:#64748b">
                    <div style="font-weight:600; color:#16a34a">${c.nextMould}</div>
                    <div style="font-size:0.75rem; font-family:monospace">${c.nextCode}</div>
                 </div>
                 <div style="font-weight:600; font-family:monospace; color:#334155">${timeStr}</div>
                 <div style="text-align:center"><span class="tag ${c.shift === 'Day' ? 'y' : 'b'}">${c.shift}</span></div>
             </div>
          `;
      });

      html += '</div>';
      list.innerHTML = html;
    };



  </script>
  <!-- Complete Plan Modal (New) -->
