<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Debugger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #222;
        }

        .status {
            font-weight: bold;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #ef4444;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Dashboard Debugger</h1>

    <div class="box">
        <h3>1. API Connectivity</h3>
        <div id="api-status">Testing...</div>
        <pre id="api-result" style="font-size:0.8rem; color:#aaa"></pre>
    </div>

    <div class="box">
        <h3>2. SSE (Real-Time Events)</h3>
        <div id="sse-status">Connecting...</div>
        <div id="sse-log"
            style="font-family:monospace; max-height:100px; overflow-y:auto; background:#000; padding:5px; margin-top:10px;">
        </div>
    </div>

    <div class="box">
        <h3>3. Audio / Voice Test</h3>
        <p>Click button to test Siren + Voice (English/Hindi/Gujarati)</p>
        <button onclick="testAlert()">Trigger Test Alert</button>
        <div id="audio-status" style="margin-top:10px"></div>
    </div>

    <script src="/assets/app.js"></script>
    <script>
        // 1. API Test
        async function testAPI() {
            const el = document.getElementById('api-status');
            const resEl = document.getElementById('api-result');
            try {
                // Check if JPSMS loaded
                if (!window.JPSMS) throw new Error("JPSMS global not found (app.js issue?)");

                el.textContent = "Fetching /api/assembly/active...";
                const res = await JPSMS.api.request('/assembly/active', { skipLoader: true });
                el.innerText = "SUCCESS: Connected to Backend";
                el.className = "status success";
                resEl.textContent = JSON.stringify(res, null, 2);
            } catch (e) {
                el.innerText = "FAILED: " + e.message;
                el.className = "status error";
                console.error(e);
            }
        }

        // 2. SSE Test
        function testSSE() {
            const el = document.getElementById('sse-status');
            const log = document.getElementById('sse-log');

            try {
                const evt = new EventSource('/api/assembly/events');
                evt.onopen = () => {
                    el.innerText = "CONNECTED";
                    el.className = "status success";
                    log.innerHTML += "<div>[OPEN] Connection established</div>";
                };
                evt.onmessage = (e) => {
                    log.innerHTML += `<div>[MSG] ${e.data}</div>`;
                };
                evt.onerror = (e) => {
                    el.innerText = "ERROR / CLOSED";
                    el.className = "status error";
                    log.innerHTML += "<div>[ERR] Connection failed/closed</div>";
                    console.log(e);
                };
            } catch (e) {
                el.innerText = "CRITICAL ERROR: " + e.message;
            }
        }

        // 3. Audio Test
        function testAlert() {
            const el = document.getElementById('audio-status');
            el.textContent = "Playing...";

            // Siren
            const audio = new Audio('/assets/siren.mp3');
            audio.play()
                .then(() => el.textContent += " [Siren OK]")
                .catch(e => el.textContent += " [Siren FAIL: " + e.message + "]");

            // Voice
            const synth = window.speechSynthesis;
            if (synth.speaking) synth.cancel();

            const msgs = [
                { t: "Testing English Voice", l: 'en-US' },
                { t: "Hindi Voice Test", l: 'hi-IN' },
                { t: "Gujarati Voice Test", l: 'gu-IN' }
            ];

            msgs.forEach(m => {
                const u = new SpeechSynthesisUtterance(m.t);
                u.lang = m.l;
                synth.speak(u);
            });

            el.textContent += " [Voice Queued]";
        }

        // Run
        setTimeout(testAPI, 500);
        setTimeout(testSSE, 1000);
    </script>
</body>

</html>
