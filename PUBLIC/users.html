<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMS Ocean - Users</title>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <link rel="stylesheet" href="/assets/app.css?v=6">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="main-content">
        <div class="header">
            <div class="page-title">User Management</div>
            <button class="btn btn-primary" id="btnAddUser" onclick="openUserModal()">+ Add User</button>
        </div>

        <div class="card">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Line / Scope</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Create User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <h3 style="margin-top:0">Add/Edit User</h3>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input id="u_username" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input id="u_password" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <div style="display:flex; gap:5px">
                    <select id="u_role" class="form-control" style="flex:1">
                        <!-- Dynamic -->
                    </select>
                    <button class="btn btn-outline" onclick="createRole()" title="Create New Role"
                        style="padding:0 10px; font-weight:bold">+</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Line (Optional)</label>
                <input id="u_line" class="form-control" placeholder="e.g. 1">
            </div>

            <div class="form-group" style="display:flex; align-items:center; gap:8px; margin-bottom:15px">
                <input type="checkbox" id="u_global" style="width:18px; height:18px">
                <label for="u_global" style="font-weight:600; cursor:pointer">Global Access (Remote Login)</label>
            </div>

            <div class="form-group">
                <label class="form-label">Assigned Factories</label>
                <div id="factoryChecks"
                    style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; max-height:100px; overflow-y:auto; border:1px solid #e5e7eb; padding:8px; border-radius:6px">
                    <!-- Dynamic -->
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" style="margin-bottom:8px">Permissions</label>
                <table class="table-sm" id="permTable" style="width:100%; border-collapse:collapse; font-size:0.9rem">
                    <thead style="background:#f3f4f6">
                        <tr>
                            <th style="text-align:left; padding:4px">Feature</th>
                            <th style="text-align:center; padding:4px">View</th>
                            <th style="text-align:center; padding:4px">Edit</th>
                            <th style="text-align:center; padding:4px">Print</th>
                            <th style="text-align:center; padding:4px">Other</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Generated by JS -->
                    </tbody>
                </table>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px">
                <button class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="pwdModal">
        <div class="modal-content">
            <h3 style="margin-top:0">Change Password</h3>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input id="p_password" class="form-control">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px">
                <button class="btn btn-outline" onclick="closePwdModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePassword()">Update</button>
            </div>
        </div>
    </div>

    <script src="/assets/app_core.js?v=1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            JPSMS.auth.requireAuth();
            JPSMS.renderShell('users');
            if (!JPSMS.auth.can('users', 'edit')) {
                document.getElementById('btnAddUser').style.display = 'none';
            }
            loadUsers();
            loadRoles();
            loadFactories();

            // Auto-check for admin
            document.getElementById('u_role').addEventListener('change', (e) => {
                const val = e.target.value;
                if (val === 'admin' || val === 'superadmin') {
                    toggleAllPerms(true);
                    document.getElementById('u_global').checked = true;
                    // Check all factories? Maybe not automatically
                }
            });
        });

        async function loadUsers() {
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '<tr><td>Loading...</td></tr>';
            try {
                const res = await JPSMS.api.get('/users');
                const rows = res.data || [];
                tbody.innerHTML = rows.map(u => `
          <tr>
            <td>
                ${u.username} 
                ${u.global_access ? '<i class="bi bi-globe" title="Global Access" style="color:#2563eb; margin-left:4px"></i>' : ''}
            </td>
            <td><span class="badge">${u.role_code || 'operator'}</span></td>
            <td>${u.line || '-'}</td>
            <td>
                <div>${u.is_active !== false ? 'Active' : 'Inactive'}</div>
                <div style="font-size:0.75rem; opacity:0.7">${(u.assigned_factories?.length || 0)} Factories</div>
            </td>
            <td style="display:flex; gap:5px;">
                ${JPSMS.auth.can('users', 'edit') ? `
                    <button class="btn btn-sm btn-outline" onclick='editUser("${u.username}", "${u.role_code}", "${u.line}", ${JSON.stringify(u.permissions || {})}, ${u.global_access}, ${JSON.stringify(u.assigned_factories || [])})'>Edit</button>
                    <button class="btn btn-sm btn-outline" onclick="openPwdModal('${u.username}')">Pwd</button>
                    ${(window.JPSMS.auth.getUser().role_code === 'admin') ?
                            `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.username}')" style="background:#ef4444; color:white; border:none">Del</button>`
                            : ''}
                ` : '<span style="color:#999;font-size:0.8rem">Read Only</span>'}
            </td>
          </tr>
        `).join('');
            } catch (e) {
                console.error("DEBUG ERROR LOADING USERS:", e);
                tbody.innerHTML = '<tr><td colspan="5">Error: ' + e.message + ' ' + e.stack + '</td></tr>';
            }
        }

        function renderPermTable(perms = {}) {
            const tbody = document.querySelector('#permTable tbody');

            // 1. Build Full Menu (System Menu + Critical Ops)
            const systemMenu = JPSMS.MENU || [];
            // Clone to avoid mutating original if needed, though concat returns new array
            const fullMenu = systemMenu.concat([
                { id: 'approvals', label: 'Approvals & Reviews', icon: 'bi-check-all' },
                {
                    id: 'critical_ops', label: 'Critical Operations', icon: 'bi-shield-lock', items: [
                        { id: 'data_wipe', label: 'Wipe / Reset Data' },
                        { id: 'log_clear', label: 'Clear Logs' }
                    ]
                }
            ]);

            let html = '';

            fullMenu.forEach(m => {
                // Parent Row (Bold)
                const p = perms[m.id] || {};
                const parentId = m.id;

                // Helper for Checkboxes
                // We add class `group-${parentId}` to ALL checkboxes in this tree (Parent + Children)
                // This allows the "Select All" toggle to find them easily.
                const mkChk = (id, type, isChecked) => `
                    <input type="checkbox" 
                           class="perm-chk group-${parentId}" 
                           data-f="${id}" 
                           data-t="${type}" 
                           ${isChecked ? 'checked' : ''}>
                `;

                html += `
                    <tr style="border-bottom:1px solid #eee; background:#f8fafc;">
                        <td style="padding:8px; font-weight:700; color:#0f172a; display:flex; align-items:center; gap:8px">
                            <input type="checkbox" title="Select All for ${m.label}" onchange="toggleGroup('${parentId}', this.checked)">
                            <i class="bi ${m.icon || 'bi-circle'}" style="opacity:0.6"></i> ${m.label}
                        </td>
                        <td style="text-align:center">${mkChk(m.id, 'view', p.view)}</td>
                        <td style="text-align:center">${mkChk(m.id, 'edit', p.edit)}</td>
                        <td style="text-align:center">${mkChk(m.id, 'print', p.print)}</td>
                        <td style="text-align:center">${mkChk(m.id, 'other', p.other)}</td>
                    </tr>
                `;

                // Sub-items (Indented)
                if (m.items && m.items.length > 0) {
                    m.items.forEach(sub => {
                        const sp = perms[sub.id] || {};
                        html += `
                        <tr style="border-bottom:1px solid #fcfcfc">
                            <td style="padding:4px 4px 4px 32px; font-size:0.9rem; color:#64748b; display:flex; align-items:center; gap:6px">
                                └ ${sub.label}
                            </td>
                            <td style="text-align:center">${mkChk(sub.id, 'view', sp.view)}</td>
                            <td style="text-align:center">${mkChk(sub.id, 'edit', sp.edit)}</td>
                            <td style="text-align:center">${mkChk(sub.id, 'print', sp.print)}</td>
                            <td style="text-align:center">${mkChk(sub.id, 'other', sp.other)}</td>
                        </tr>
                        `;
                    });
                }
            });

            tbody.innerHTML = html;
        }

        function toggleGroup(groupId, state) {
            // Select ALL checkboxes that belong to this group (Parent + Children)
            document.querySelectorAll(`.group-${groupId}`).forEach(box => {
                box.checked = state;
            });
        }

        function getPermsFromTable() {
            const perms = {};
            document.querySelectorAll('#permTable input[type="checkbox"]').forEach(box => {
                // Skip the "Select All" checkboxes which don't have data attributes suitable for perms
                if (!box.dataset.f) return;

                const f = box.dataset.f;
                const t = box.dataset.t;
                if (!perms[f]) perms[f] = {};
                if (box.checked) perms[f][t] = true;
            });
            return perms;
        }

        function toggleAllPerms(state) {
            document.querySelectorAll('#permTable input[type="checkbox"]').forEach(box => {
                box.checked = state;
            });
        }

        let isEditMode = false;

        function openUserModal() {
            isEditMode = false;
            document.getElementById('userModal').style.display = 'flex';
            document.querySelector('#userModal h3').textContent = 'Add User';

            document.getElementById('u_username').value = '';
            document.getElementById('u_username').disabled = false;

            document.getElementById('u_password').parentElement.style.display = 'block';
            document.getElementById('u_password').value = '';

            document.getElementById('u_line').value = '';

            renderPermTable({}); // Empty perms

            // Checks
            document.getElementById('u_global').checked = false;
            document.querySelectorAll('.factory-chk').forEach(c => c.checked = false);
        }

        function editUser(username, role, line, permStr, globalAccess, factories) {
            isEditMode = true;
            document.getElementById('userModal').style.display = 'flex';
            document.querySelector('#userModal h3').textContent = 'Edit User';

            document.getElementById('u_username').value = username;
            document.getElementById('u_username').disabled = true;

            document.getElementById('u_password').parentElement.style.display = 'none';

            document.getElementById('u_role').value = role || 'operator';
            document.getElementById('u_line').value = line !== 'null' ? line : '';

            // Global
            document.getElementById('u_global').checked = !!globalAccess;

            // Factories
            const fList = factories || [];
            document.querySelectorAll('.factory-chk').forEach(c => {
                c.checked = fList.includes(parseInt(c.value));
            });

            let perms = {};
            try { perms = typeof permStr === 'object' ? permStr : JSON.parse(permStr || '{}'); } catch (e) { }

            // If admin, force show all checked visually
            if (role === 'admin') {
                renderPermTable({}); // Render empty first
                toggleAllPerms(true);
            } else {
                renderPermTable(perms);
            }
        }

        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        async function saveUser() {
            const u = {
                username: document.getElementById('u_username').value,
                role: document.getElementById('u_role').value,
                line: document.getElementById('u_line').value,
                permissions: getPermsFromTable(),
                global_access: document.getElementById('u_global').checked,
                factories: Array.from(document.querySelectorAll('.factory-chk:checked')).map(c => parseInt(c.value))
            };

            if (!isEditMode) {
                u.password = document.getElementById('u_password').value;
                if (!u.username || !u.password) return JPSMS.toast('Username & Password required', 'error');

                try {
                    await JPSMS.api.post('/users/save', u);
                    JPSMS.toast('User saved');
                    closeUserModal();
                    loadUsers();
                } catch (e) { /* handled */ }
            } else {
                try {
                    await JPSMS.api.post('/users/save', u);
                    JPSMS.toast('User updated');
                    closeUserModal();
                    loadUsers();
                } catch (e) { /* handled */ }
            }
        }

        async function deleteUser(username) {
            if (!confirm('Delete user ' + username + '?')) return;
            try {
                await JPSMS.api.post('/users/delete', { username });
                JPSMS.toast('User deleted');
                loadUsers();
            } catch (e) { /* handled */ }
        }

        // Password Modal
        let pwdTargetUser = null;
        function openPwdModal(username) {
            pwdTargetUser = username;
            document.getElementById('pwdModal').style.display = 'flex';
            document.getElementById('p_password').value = '';
        }
        function closePwdModal() {
            document.getElementById('pwdModal').style.display = 'none';
            pwdTargetUser = null;
        }
        async function savePassword() {
            const pwd = document.getElementById('p_password').value;
            if (!pwd) return JPSMS.toast('Enter password', 'error');
            try {
                await JPSMS.api.post('/users/password', { username: pwdTargetUser, password: pwd });
                JPSMS.toast('Password updated');
                closePwdModal();
            } catch (e) { /* handled */ }
        }

        /* ==================== ROLES ==================== */
        async function loadRoles(selected = null) {
            const sel = document.getElementById('u_role');
            sel.innerHTML = '<option>Loading...</option>';
            try {
                const res = await JPSMS.api.get('/roles');
                const list = res.data || [];
                sel.innerHTML = '';
                list.forEach(r => {
                    const opt = new Option(r.label, r.code);
                    sel.add(opt);
                });
                if (selected) sel.value = selected;
            } catch (e) {
                sel.innerHTML = '<option value="">Error loading roles</option>';
            }
        }

        async function createRole() {
            const label = prompt('Enter Name for New Role (e.g. "Line Manager"):');
            if (!label) return;

            // Auto-generate code
            const code = label.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');

            if (!confirm(`Create new role "${label}" (Internal Code: ${code})?`)) return;

            try {
                const res = await JPSMS.api.post('/roles/create', { code, label });
                if (res.ok) {
                    JPSMS.toast('Role created');
                    await loadRoles(res.code); // Reload and select new
                } else {
                    alert('Error: ' + (res.error || 'Failed'));
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function loadFactories() {
            const div = document.getElementById('factoryChecks');
            div.innerHTML = 'Loading...';
            try {
                const res = await JPSMS.api.get('/factories');
                const list = res.data || [];
                div.innerHTML = list.map(f => `
                    <div style="display:flex; align-items:center; gap:5px">
                        <input type="checkbox" value="${f.id}" class="factory-chk" id="fc_${f.id}">
                        <label for="fc_${f.id}" style="font-size:0.9rem; cursor:pointer">${f.name}</label>
                    </div>
                `).join('');
            } catch (e) {
                div.innerHTML = 'Error loading factories';
            }
        }
    </script>
    <script src="/assets/ai-chat.js"></script>
</body>

</html>
